name: Validate and apply A3 discrete timestep repair

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/apply-a3-discrete-timestep.yml"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Generate repair patch
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              p = Path(path)
              text = p.read_text(encoding="utf-8")
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"expected exactly one match in {path}, found {count}")
              p.write_text(text.replace(old, new, 1), encoding="utf-8")

          replace_once(
              "cpp/include/tdmz/core/engine.hpp",
              "    void recompute_base_distance_cache() const;\n",
              "    StepResult step_one_tick();\n\n    void recompute_base_distance_cache() const;\n",
          )
          replace_once(
              "cpp/src/core/engine.cpp",
              "#include <functional>\n#include <stdexcept>\n",
              "#include <functional>\n#include <limits>\n#include <stdexcept>\n",
          )
          replace_once(
              "cpp/src/core/engine.cpp",
              '''StepResult TDEngine::step_wait(int wait_steps) {
    StepResult r;
    for (int i = 0; i < wait_steps; ++i) {
        auto step_r = step_time(1.0f);
        r.reward += step_r.reward;
        if (step_r.done) {
            r.done = true;
            break;
        }
    }
    return r;
}
''',
              '''StepResult TDEngine::step_wait(int wait_steps) {
    if (wait_steps < 0) {
        throw std::invalid_argument("wait_steps must be non-negative");
    }
    return step_time(static_cast<float>(wait_steps));
}
''',
          )
          replace_once(
              "cpp/src/core/engine.cpp",
              '''StepResult TDEngine::step_time(float dt) {
    if (game_over_) return {0.0f, true};

    float step_reward = 0.0f;
''',
              '''StepResult TDEngine::step_time(float dt) {
    const double seconds = static_cast<double>(dt);
    if (!std::isfinite(seconds) || seconds < 0.0 || std::floor(seconds) != seconds ||
        seconds > static_cast<double>(std::numeric_limits<int>::max())) {
        throw std::invalid_argument("step_time requires a finite non-negative integer number of seconds");
    }

    const int ticks = static_cast<int>(seconds);
    StepResult result{0.0f, game_over_};
    for (int i = 0; i < ticks && !result.done; ++i) {
        const StepResult tick = step_one_tick();
        result.reward += tick.reward;
        result.done = tick.done;
    }
    return result;
}

StepResult TDEngine::step_one_tick() {
    if (game_over_) return {0.0f, true};

    constexpr float dt = 1.0f;
    float step_reward = 0.0f;
''',
          )

          test_path = Path("cpp/tests/test_game_logic.cpp")
          test_text = test_path.read_text(encoding="utf-8")
          test_text = test_text.replace(
              "#include <iostream>\n#include <stdexcept>\n",
              "#include <iostream>\n#include <limits>\n#include <stdexcept>\n",
              1,
          )
          helper_anchor = '#define CHECK_TRUE(x) check_true(static_cast<bool>(x), #x, __LINE__)\n'
          helper_code = r'''

static bool near_float(float a, float b, float eps = 1e-5f) {
    return std::abs(a - b) <= eps;
}

template <typename Fn>
static void check_invalid_argument(Fn&& fn) {
    bool threw = false;
    try {
        fn();
    } catch (const std::invalid_argument&) {
        threw = true;
    }
    CHECK_TRUE(threw);
}

static void check_engine_state_equal(const TDEngine& lhs, const TDEngine& rhs) {
    CHECK_TRUE(lhs.grid() == rhs.grid());
    CHECK_TRUE(lhs.money() == rhs.money());
    CHECK_TRUE(lhs.base_hp() == rhs.base_hp());
    CHECK_TRUE(lhs.wave() == rhs.wave());
    CHECK_TRUE(near_float(lhs.spawn_timer(), rhs.spawn_timer()));
    CHECK_TRUE(lhs.enemies_to_spawn_count() == rhs.enemies_to_spawn_count());
    CHECK_TRUE(near_float(lhs.pending_spawn_total_hp(), rhs.pending_spawn_total_hp()));
    CHECK_TRUE(lhs.game_over() == rhs.game_over());
    CHECK_TRUE(near_float(lhs.time(), rhs.time()));
    CHECK_TRUE(lhs.grid_version() == rhs.grid_version());
    CHECK_TRUE(lhs.tower_version() == rhs.tower_version());
    CHECK_TRUE(lhs.money_version() == rhs.money_version());
    CHECK_TRUE(lhs.enemy_version() == rhs.enemy_version());
    CHECK_TRUE(lhs.wave_version() == rhs.wave_version());

    CHECK_TRUE(lhs.towers().size() == rhs.towers().size());
    for (size_t i = 0; i < lhs.towers().size(); ++i) {
        const Tower& a = lhs.towers()[i];
        const Tower& b = rhs.towers()[i];
        CHECK_TRUE(a.x == b.x);
        CHECK_TRUE(a.y == b.y);
        CHECK_TRUE(a.type == b.type);
        CHECK_TRUE(a.cost == b.cost);
        CHECK_TRUE(near_float(a.damage, b.damage));
        CHECK_TRUE(near_float(a.range, b.range));
        CHECK_TRUE(near_float(a.cooldown_max, b.cooldown_max));
        CHECK_TRUE(near_float(a.aoe_radius, b.aoe_radius));
        CHECK_TRUE(near_float(a.slow_factor, b.slow_factor));
        CHECK_TRUE(near_float(a.slow_duration, b.slow_duration));
        CHECK_TRUE(near_float(a.cooldown, b.cooldown));
        CHECK_TRUE(a.level == b.level);
        CHECK_TRUE(a.total_spent == b.total_spent);
        CHECK_TRUE(a.upgrade_cost == b.upgrade_cost);
    }

    CHECK_TRUE(lhs.enemies().size() == rhs.enemies().size());
    for (size_t i = 0; i < lhs.enemies().size(); ++i) {
        const Enemy& a = lhs.enemies()[i];
        const Enemy& b = rhs.enemies()[i];
        CHECK_TRUE(a.id == b.id);
        CHECK_TRUE(near_float(a.x, b.x));
        CHECK_TRUE(near_float(a.y, b.y));
        CHECK_TRUE(near_float(a.target_x, b.target_x));
        CHECK_TRUE(near_float(a.target_y, b.target_y));
        CHECK_TRUE(near_float(a.hp, b.hp));
        CHECK_TRUE(near_float(a.max_hp, b.max_hp));
        CHECK_TRUE(near_float(a.speed, b.speed));
        CHECK_TRUE(near_float(a.base_speed, b.base_speed));
        CHECK_TRUE(near_float(a.slow_timer, b.slow_timer));
        CHECK_TRUE(a.reward == b.reward);
        CHECK_TRUE(a.path == b.path);
    }
}
'''
          if test_text.count(helper_anchor) != 1:
              raise RuntimeError("failed to locate test helper anchor")
          test_text = test_text.replace(helper_anchor, helper_anchor + helper_code, 1)

          new_tests = r'''

void test_step_time_zero_is_noop() {
    TDEngine before(11, 11, 17);
    TDEngine after(11, 11, 17);
    const StepResult result = after.step_time(0.0f);
    CHECK_TRUE(result.reward == 0.0f);
    CHECK_TRUE(!result.done);
    check_engine_state_equal(before, after);
}

void test_step_time_rejects_non_discrete_inputs() {
    TDEngine env(11, 11, 0);
    check_invalid_argument([&] { (void)env.step_time(-1.0f); });
    check_invalid_argument([&] { (void)env.step_time(0.5f); });
    check_invalid_argument([&] { (void)env.step_time(1.25f); });
    check_invalid_argument([&] { (void)env.step_time(std::numeric_limits<float>::infinity()); });
    check_invalid_argument([&] { (void)env.step_time(-std::numeric_limits<float>::infinity()); });
    check_invalid_argument([&] { (void)env.step_time(std::numeric_limits<float>::quiet_NaN()); });
    check_invalid_argument([&] { (void)env.step_time(std::numeric_limits<float>::max()); });
    check_invalid_argument([&] { (void)env.step_wait(-1); });
}

void test_multi_tick_step_matches_repeated_single_ticks() {
    TDEngine batched(11, 11, 29);
    TDEngine repeated(11, 11, 29);
    CHECK_TRUE(batched.place_tower(1, 4, TowerType::Slow));
    CHECK_TRUE(repeated.place_tower(1, 4, TowerType::Slow));

    const StepResult batched_result = batched.step_time(8.0f);
    StepResult repeated_result;
    for (int i = 0; i < 8 && !repeated_result.done; ++i) {
        const StepResult tick = repeated.step_time(1.0f);
        repeated_result.reward += tick.reward;
        repeated_result.done = tick.done;
    }
    CHECK_TRUE(near_float(batched_result.reward, repeated_result.reward));
    CHECK_TRUE(batched_result.done == repeated_result.done);
    check_engine_state_equal(batched, repeated);

    const StepResult batched_followup = batched.step_time(6.0f);
    StepResult repeated_followup;
    for (int i = 0; i < 6 && !repeated_followup.done; ++i) {
        const StepResult tick = repeated.step_wait(1);
        repeated_followup.reward += tick.reward;
        repeated_followup.done = tick.done;
    }
    CHECK_TRUE(near_float(batched_followup.reward, repeated_followup.reward));
    CHECK_TRUE(batched_followup.done == repeated_followup.done);
    check_engine_state_equal(batched, repeated);
}
'''
          main_anchor = "\nint main() {\n"
          if test_text.count(main_anchor) != 1:
              raise RuntimeError("failed to locate game-logic main anchor")
          test_text = test_text.replace(main_anchor, new_tests + main_anchor, 1)
          test_text = test_text.replace(
              "    test_constructor_rejects_non_11x11();\n",
              "    test_constructor_rejects_non_11x11();\n    test_step_time_zero_is_noop();\n    test_step_time_rejects_non_discrete_inputs();\n    test_multi_tick_step_matches_repeated_single_ticks();\n",
              1,
          )
          test_path.write_text(test_text, encoding="utf-8")

          plan_path = Path("docs/cpp_fix_plan_2026-07-10.md")
          plan = plan_path.read_text(encoding="utf-8")
          old_a3 = '''### A3. General timestep contract — pending

Choose and enforce one contract:

- discrete engine: only integral one-second ticks are accepted; or
- continuous engine: spawn timers and tower cooldowns consume timer overshoot and may trigger multiple events in one call.

The current RL path uses one-second actions, but the public `step_time(float dt)` API must not claim continuous semantics unless all timers satisfy timestep equivalence.
'''
          new_a3 = '''### A3. General timestep contract — completed

- The engine uses discrete one-second ticks; one action advances exactly one tick.
- `step_time(dt)` accepts only finite, non-negative integer seconds and executes that many one-second ticks.
- `step_time(0)` is a no-op that preserves the current terminal state.
- Negative, fractional, NaN, infinite, and out-of-range durations are rejected explicitly.
- `step_wait()` delegates to the same discrete contract and rejects negative waits.
- Regression tests compare complete public engine state for a multi-tick call against repeated one-tick calls, including follow-up evolution.

Compatibility impact: callers that previously passed fractional `dt` must migrate to explicit one-second ticks. Standard RL actions and Golden Trace behavior remain unchanged.
'''
          if plan.count(old_a3) != 1:
              raise RuntimeError("failed to locate A3 plan section")
          plan = plan.replace(old_a3, new_a3, 1)
          start = plan.index("## Current completed commits")
          end = plan.index("New Golden Trace values after A1:")
          replacement = '''## Current compact history

- `dd9cecced9bd0b6a5acfa46c06b9b2eef9b21a32` — compact C++ baseline containing all work completed before A3.
- Post-baseline work is squash-merged once per independently validated phase; implementation, tests, benchmarks, and plan updates stay in the same commit.

'''
          plan = plan[:start] + replacement + plan[end:]
          plan_path.write_text(plan, encoding="utf-8")
          PY

          git diff --binary -- cpp docs > a3-discrete-timestep.patch
          test -s a3-discrete-timestep.patch

      - name: Upload exact patch
        uses: actions/upload-artifact@v4
        with:
          name: a3-discrete-timestep-patch
          path: a3-discrete-timestep.patch
          if-no-files-found: error

  test:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout staged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Download exact patch
        uses: actions/download-artifact@v4
        with:
          name: a3-discrete-timestep-patch

      - name: Apply exact patch
        shell: bash
        run: |
          git apply --check a3-discrete-timestep.patch
          git apply a3-discrete-timestep.patch

      - name: Configure
        run: cmake -S cpp -B cpp/build-a3 -G Ninja -DCMAKE_BUILD_TYPE=Release -DTDMZ_ENABLE_TORCH=OFF

      - name: Build
        run: cmake --build cpp/build-a3 --parallel

      - name: Test
        run: ctest --test-dir cpp/build-a3 --output-on-failure

  finalize:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact staged commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Download validated patch
        uses: actions/download-artifact@v4
        with:
          name: a3-discrete-timestep-patch

      - name: Apply and replace staged commit
        shell: bash
        env:
          EXPECTED_MASTER: ${{ github.sha }}
        run: |
          git apply --check a3-discrete-timestep.patch
          git apply a3-discrete-timestep.patch
          rm a3-discrete-timestep.patch
          rm .github/workflows/apply-a3-discrete-timestep.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit --amend -m "Enforce discrete engine timestep semantics"
          git push --force-with-lease=refs/heads/master:${EXPECTED_MASTER} origin HEAD:master
          git push origin --delete fix/a3-discrete-timestep || true
